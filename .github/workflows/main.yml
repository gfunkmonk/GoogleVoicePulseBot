name: GV-Pulse Keep-Alive

on:
  schedule:
    # Runs at 09:45 UTC on the 1st of every month
    - cron: '45 9 1 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  keep-alive:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Send keep-alive SMS
        id: send1
        continue-on-error: true
        env:
          GMAIL_USER:     ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          GV_GATEWAYS:    ${{ secrets.GV_GATEWAYS }}
        run: python main.py

      - name: Send keep-alive SMS 2
        id: send2
        continue-on-error: true
        env:
          GMAIL_USER:     ${{ secrets.GMAIL_USER2 }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD2 }}
          GV_GATEWAYS:    ${{ secrets.GV_GATEWAYS2 }}
        run: python main.py

      - name: Update keep-alive log
        if: always()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"

          # Switch to (or create) the dedicated logs branch
          git checkout logs 2>/dev/null || git checkout -b logs

          echo "$(TZ=':America/New_York' date '+%m-%d-%Y %I:%M:%S %p %Z') — keep-alive run" >> keepalive.log
          
          git add keepalive.log
          git diff --cached --quiet \
            && echo "Nothing to commit." \
            || git commit -m "chore: keepalive log [skip ci]"

          git push origin logs

      - name: Fail job if any account failed
        if: steps.send1.outcome == 'failure' || steps.send2.outcome == 'failure'
        run: exit 1

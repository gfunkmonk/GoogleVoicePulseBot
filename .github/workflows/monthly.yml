name: Google Voice Monthly SMS

on:
  schedule:
    - cron: '0 15 1 * *'
  workflow_dispatch:

jobs:
  send_sms:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium

      - name: Restore storage state
        env:
          PLAYWRIGHT_STORAGE_STATE: ${{ secrets.PLAYWRIGHT_STORAGE_STATE }}
        run: |
          if [ -n "$PLAYWRIGHT_STORAGE_STATE" ]; then
            printf '%s' "$PLAYWRIGHT_STORAGE_STATE" > state.json
          else
            echo "PLAYWRIGHT_STORAGE_STATE is not configured. Skipping send."
          fi

      - name: Create script
        run: |
          cat > send.js << 'EOF'
          const { chromium } = require('playwright');
          const { existsSync } = require('node:fs');

          (async () => {
            if (!existsSync('state.json')) {
              console.log('state.json not found; skipping send.');
              return;
            }

            const browser = await chromium.launch({ headless: true });
            const context = await browser.newContext({
              storageState: 'state.json'
            });

            const page = await context.newPage();
            await page.goto('https://voice.google.com');

            await page.click('text=Send a message');
            await page.fill('input[aria-label="Type a name or phone number"]', process.env.TO_NUMBER);
            await page.keyboard.press('Enter');
            await page.fill('div[aria-label="Type a message"]', 'monthly activity');
            await page.keyboard.press('Enter');

            await browser.close();
          })();
          EOF

      - name: Run script
        env:
          TO_NUMBER: ${{ secrets.TO_NUMBER }}
        run: node send.js
